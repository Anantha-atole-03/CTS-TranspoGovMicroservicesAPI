spring.application.name=REPORTANALYTICSSERVICE
server.port=8087
spring.config.import=optional:configserver:http://localhost:8079
spring.cloud.config.server.git.skip-ssl-validation=true

spring.datasource.url=jdbc:mysql://localhost:3306/report_db?createDatabaseIfNotExist=true

 eureka.client.service-url.defaultZone=http://localhost:8761/eureka
 
# Enable feign circuit breaker
feign.circuitbreaker.enabled=true

# Resilience4j settings
resilience4j.circuitbreaker.instances.complianceService.register-health-indicator=true
resilience4j.circuitbreaker.instances.programService.register-health-indicator=true
resilience4j.circuitbreaker.instances.routeService.register-health-indicator=true
resilience4j.circuitbreaker.instances.ticketService.register-health-indicator=true