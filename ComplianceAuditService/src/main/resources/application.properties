# Automatically move to HALF_OPEN
resilience4j.circuitbreaker.instances.TICKETFARESERVICE.automatic-transition-from-open-to-half-open-enabled=true





# Default circuit breaker config
resilience4j.circuitbreaker.instances.ROUTESCHEDULESERVICE.register-health-indicator=true

resilience4j.circuitbreaker.instances.ROUTESCHEDULESERVICE.sliding-window-type=COUNT_BASED
