spring.application.name=TicketFareService
server.port=8089
spring.config.import=optional:configserver:http://localhost:8079
spring.cloud.config.server.git.skip-ssl-validation=true

spring.datasource.url=jdbc:mysql://localhost:3306/route_schedule_db?createDatabaseIfNotExist=true

eureka.instance.prefer-ip-address=true
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true
eureka.client.service-url.default-zone=http://localhost:8761/eureka

spring.cloud.openfeign.circuitbreaker.enabled=true

# Default circuit breaker config
resilience4j.circuitbreaker.instances.CITIZENSERVICE.register-health-indicator=true

resilience4j.circuitbreaker.instances.CITIZENSERVICE.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.CITIZENSERVICE.sliding-window-size=10

resilience4j.circuitbreaker.instances.CITIZENSERVICE.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.CITIZENSERVICE.minimum-number-of-calls=5


resilience4j.circuitbreaker.instances.CITIZENSERVICE.wait-duration-in-open-state=10s

# Calls allowed in HALF_OPEN
resilience4j.circuitbreaker.instances.CITIZENSERVICE.permitted-number-of-calls-in-half-open-state=3

# Automatically move to HALF_OPEN
resilience4j.circuitbreaker.instances.CITIZENSERVICE.automatic-transition-from-open-to-half-open-enabled=true