spring.application.name=ApiGateway
server.port=8081

# ===============================
# Eureka Client
# ===============================
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true

# ===============================
# Spring Cloud Gateway
# ===============================

# ----- Authentication Service Routes -----
spring.cloud.gateway.server.webflux.routes[0].id=authentication-service
spring.cloud.gateway.server.webflux.routes[0].uri=lb://AUTHENTICATIONSERVICE
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/auth/**
spring.cloud.gateway.server.webflux.routes[0].filters[0].name=StripPrefix
spring.cloud.gateway.server.webflux.routes[0].filters[0].args.parts=0
spring.cloud.gateway.server.webflux.routes[0].filters[1].name=CircuitBreaker
spring.cloud.gateway.server.webflux.routes[0].filters[1].args.name=authenticationServiceCircuitBreaker
spring.cloud.gateway.server.webflux.routes[0].filters[1].args.fallbackUri=forward:/fallback/authentication-service-fallback


