spring.application.name=CitizenService
server.port=8083
spring.config.import=optional:configserver:http://localhost:8079
spring.cloud.config.server.git.skip-ssl-validation=true

spring.datasource.url=jdbc:mysql://localhost:3306/citizen_db?createDatabaseIfNotExist=true

management.endpoints.web.exposure.include=prometheus,health,info
management.endpoint.health.show-details=always
